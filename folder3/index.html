const playlist=document.getElementById("playlist");

// =========================
// PARSE M3U
// =========================

function parseM3U(text){

    const lines=text.split("\n");
    const result=[];

    let name="";
    let logo="";
    let group="อื่นๆ";

    let drm=false;
    let keyId="";
    let key="";

    for(const line of lines){

        const l=line.trim();

        if(!l) continue;

        if(l.startsWith("#EXTINF")){

            const g=l.match(/group-title="([^"]+)"/);
            const lg=l.match(/tvg-logo="([^"]+)"/);

            group=g ? g[1] : "อื่นๆ";
            logo=lg ? lg[1] : "";

            name=l.split(",").pop().trim();

            drm=false;
            keyId="";
            key="";
        }

        else if(
            l.includes("license_key=")
        ){

            const data=l.split("license_key=")[1];

            if(data.includes(":")){

                const parts=data.split(":");

                drm=true;
                keyId=parts[0].trim();
                key=parts[1].trim();
            }
        }

        else if(
            l.startsWith("http")
        ){

            if(!name){

                name="Unknown Channel";
            }

            result.push({

                name,
                logo,
                group,

                url:l,

                drm,
                keyId,
                key
            });
        }
    }

    return result;
}

// =========================
// HLS PLAYER
// =========================

function fallbackPlay(url){

    document.getElementById("player").style.display="none";
    fallbackVideo.style.display="block";

    if(hls){
        hls.destroy();
        hls=null;
    }

    fallbackVideo.pause();
    fallbackVideo.removeAttribute("src");

    if(Hls.isSupported()){

        hls=new Hls({
            enableWorker:true,
            lowLatencyMode:true
        });

        hls.loadSource(url);
        hls.attachMedia(fallbackVideo);

        hls.on(Hls.Events.MANIFEST_PARSED,()=>{

            fallbackVideo.play().catch(()=>{});

        });

    }
    else if(fallbackVideo.canPlayType("application/vnd.apple.mpegurl")){

        fallbackVideo.src=url;

        fallbackVideo.play().catch(()=>{});
    }
}

// =========================
// JW PLAYER
// =========================

function playJW(channel){

    fallbackVideo.pause();

    document.getElementById("player").style.display="block";
    fallbackVideo.style.display="none";

    let config={

        file:channel.url,

        width:"100%",

        aspectratio:"16:9",

        autostart:true
    };

    if(
        channel.url
        .toLowerCase()
        .includes(".mpd")
    ){

        config.type="dash";

        if(channel.drm){

            config.drm={

                clearkey:{

                    keyId:channel.keyId,

                    key:channel.key

                }

            };
        }
    }

    try{

        if(!jw){

            jw=jwplayer("player")
            .setup(config);

        }else{

            jw.remove();

            jw=jwplayer("player")
            .setup(config);
        }

    }catch(e){

        console.log(e);
    }
}

// =========================
// PLAY CHANNEL
// =========================

function playChannel(channel){

    currentChannel=channel;

    localStorage.setItem(
        "lastChannel",
        JSON.stringify(channel)
    );

    current.textContent=
    "กำลังเล่น : "+channel.name;

    document
    .querySelectorAll(".item")
    .forEach(el=>
        el.classList.remove(
            "active-channel"
        )
    );

    const active=document.querySelector(
        `[data-url="${channel.url}"]`
    );

    if(active)
        active.classList.add(
            "active-channel"
        );

    const url=
    channel.url.toLowerCase();

    if(url.includes(".m3u8")){

        fallbackPlay(
            channel.url
        );

    }

    else if(url.includes(".mpd")){

        playJW(channel);

    }

    else{

        playJW(channel);
      
    }
}

function renderList(list){

    playlist.innerHTML="";

    list.forEach(ch=>{

        const div=document.createElement("div");

        div.className="item";
        

        div.dataset.url=ch.url;

        div.innerHTML=`
        <img
        src="${ch.logo}"
        onerror="this.src='https://via.placeholder.com/60'">

        <div>
            <div>${ch.name}</div>
            <small>${ch.group}</small>
        </div>
        `;

        div.onclick=()=>playChannel(ch);

        playlist.appendChild(div);
    });
    setTimeout(()=>{
    selectedIndex=0;
    focusItem(0);
},100);
}

function renderGroups(){

    const groups=[
        ...new Set(
            channels.map(c=>c.group)
        )
    ];

    const groupDiv=
        document.createElement("div");

    groupDiv.className="groups";

    playlist.parentNode.insertBefore(
        groupDiv,
        playlist
    );

    groups.forEach((g,index)=>{

        const btn=
            document.createElement("button");

        btn.className="group-btn";

        if(index===0)
            btn.classList.add("active");

        btn.textContent=g;

        btn.onclick=()=>{

            document
            .querySelectorAll(".group-btn")
            .forEach(b=>
                b.classList.remove("active")
            );

            btn.classList.add("active");

            renderList(
                channels.filter(
                    c=>c.group===g
                )
            );
        };

        groupDiv.appendChild(btn);
    });

    renderList(
        channels.filter(
            c=>c.group===groups[0]
        )
    );
    setTimeout(()=>{
    focusItem(0);
},300);
}

// =========================
// TV NAVIGATION (STABLE)
// =========================

let selectedIndex = 0;
let selectedGroup = 0;

function focusItem(index){

    const items = document.querySelectorAll(".item");

    if(!items.length) return;

    if(index < 0){
        index = 0;
    }

    if(index >= items.length){
        index = items.length - 1;
    }

    items.forEach(el=>{
        el.classList.remove("tv-focus");
    });

    selectedIndex = index;

    items[index].classList.add("tv-focus");

    items[index].scrollIntoView({
        block:"nearest",
        behavior:"smooth"
    });
}

function changeGroup(dir){

    const groups =
    document.querySelectorAll(".group-btn");

    if(!groups.length) return;

    selectedGroup += dir;

    if(selectedGroup < 0){
        selectedGroup = 0;
    }

    if(selectedGroup >= groups.length){
        selectedGroup = groups.length - 1;
    }

    groups[selectedGroup].click();

    setTimeout(()=>{
        focusItem(0);
    },150);
}

// remote
document.addEventListener("keydown",(e)=>{

    const items =
    document.querySelectorAll(".item");

    switch(e.keyCode){

        case 38: // UP

            e.preventDefault();

            focusItem(
                selectedIndex - 1
            );

            break;

        case 40: // DOWN

            e.preventDefault();

            focusItem(
                selectedIndex + 1
            );

            break;

        case 37: // LEFT

            e.preventDefault();

            changeGroup(-1);

            break;

        case 39: // RIGHT

            e.preventDefault();

            changeGroup(1);

            break;

        case 13: // OK

            e.preventDefault();

            if(items[selectedIndex]){
                items[selectedIndex].click();
            }

            break;

        case 166: // CH+

            e.preventDefault();

            if(selectedIndex < items.length-1){

                focusItem(selectedIndex+1);

                if(items[selectedIndex]){
                    items[selectedIndex].click();
                }
            }

            break;

        case 167: // CH-

            e.preventDefault();

            if(selectedIndex > 0){

                focusItem(selectedIndex-1);

                if(items[selectedIndex]){
                    items[selectedIndex].click();
                }
            }

            break;
    }
});

// mouse support
document.addEventListener("mousemove",(e)=>{

    const item = e.target.closest(".item");

    if(!item) return;

    const items =
    [...document.querySelectorAll(".item")];

    const idx = items.indexOf(item);

    if(idx >= 0){

        items.forEach(el=>{
            el.classList.remove("tv-focus");
        });

        selectedIndex = idx;

        item.classList.add("tv-focus");
    }

});

// initial focus
setTimeout(()=>{
    focusItem(0);
},500);
