<!DOCTYPE html>
<html>
<body>

<div id="content">Loading...</div>

<script>
fetch('1/index.html')
.then(res => res.text())
.then(html => {
    document.getElementById('content').innerHTML = html;
})
.catch(err => {
    document.getElementById('content').innerHTML =
        'Error : ' + err;
});
</script>

</body>
</html>
